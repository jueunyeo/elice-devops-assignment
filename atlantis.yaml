version: 3
automerge: false
parallel_plan: true
parallel_apply: false

projects:
  - name: aws-dev
    dir: aws/terraform/environments/dev
    workflow: aws-dev
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"
        - "../../../kubernetes/**/*.yaml"

  - name: aws-stage
    dir: aws/terraform/environments/stage
    workflow: aws-stage
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"
        - "../../../kubernetes/**/*.yaml"

  - name: aws-prod
    dir: aws/terraform/environments/prod
    workflow: aws-prod
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"
        - "../../../kubernetes/**/*.yaml"

  - name: onprem-dev
    dir: on-prem/terraform/environments/dev
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"

  - name: onprem-stage
    dir: on-prem/terraform/environments/stage
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"

  - name: onprem-prod
    dir: on-prem/terraform/environments/prod
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"

workflows:
  aws-dev:
    plan:
      steps:
        - env:
            name: AWS_ROLE_ARN
            value: arn:aws:iam::111111111111:role/OrganizationAccountAccessRole
        - env:
            name: TF_VAR_aws_account_id
            value: "111111111111"
        - run: |
            export AWS_SDK_LOAD_CONFIG=1
            export AWS_STS_REGIONAL_ENDPOINTS=regional
        - init
        - plan:
            extra_args: ["-input=false", "-lock-timeout=10m"]
    apply:
      steps:
        - env:
            name: AWS_ROLE_ARN
            value: arn:aws:iam::111111111111:role/OrganizationAccountAccessRole
        - env:
            name: TF_VAR_aws_account_id
            value: "111111111111"
        - apply

  aws-stage:
    plan:
      steps:
        - env:
            name: AWS_ROLE_ARN
            value: arn:aws:iam::222222222222:role/OrganizationAccountAccessRole
        - env:
            name: TF_VAR_aws_account_id
            value: "222222222222"
        - run: |
            export AWS_SDK_LOAD_CONFIG=1
            export AWS_STS_REGIONAL_ENDPOINTS=regional
        - init
        - plan:
            extra_args: ["-input=false", "-lock-timeout=10m"]
    apply:
      steps:
        - env:
            name: AWS_ROLE_ARN
            value: arn:aws:iam::222222222222:role/OrganizationAccountAccessRole
        - env:
            name: TF_VAR_aws_account_id
            value: "222222222222"
        - apply

  aws-prod:
    plan:
      steps:
        - env:
            name: AWS_ROLE_ARN
            value: arn:aws:iam::333333333333:role/OrganizationAccountAccessRole
        - env:
            name: TF_VAR_aws_account_id
            value: "333333333333"
        - run: |
            export AWS_SDK_LOAD_CONFIG=1
            export AWS_STS_REGIONAL_ENDPOINTS=regional
        - init
        - plan:
            extra_args: ["-input=false", "-lock-timeout=10m"]
    apply:
      steps:
        - env:
            name: AWS_ROLE_ARN
            value: arn:aws:iam::333333333333:role/OrganizationAccountAccessRole
        - env:
            name: TF_VAR_aws_account_id
            value: "333333333333"
        - apply
