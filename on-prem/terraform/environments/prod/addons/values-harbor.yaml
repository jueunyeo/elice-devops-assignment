# Kubernetes/Helm 설정 파일입니다. 운영 정책을 선언형으로 관리합니다.
# 보안 원칙: Harbor 관리자 비밀번호/DB/Redis 자격증명은 이 파일에 평문으로 두지 않습니다.
# External Secrets(Vault) 또는 별도 Secret 관리 체계로 주입하세요.

# Harbor — Prod (고가용성·보안 강화)
expose:
  type: clusterIP
  tls:
    enabled: true
    certSource: secret

persistence:
  enabled: true

trivy:
  enabled: true

notary:
  enabled: true

chartmuseum:
  enabled: false

resources:
  registry:
    requests:
      memory: 1Gi
      cpu: 500m

# 이중화·외부 DB/Redis 연동은 조직 표준에 맞게 추가
externalURL: https://harbor.prod.elice.com
