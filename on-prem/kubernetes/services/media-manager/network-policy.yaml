apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: media-manager-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: media-manager
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: media-manager-allow-from-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: media-manager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: media-manager-allow-storage-and-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: media-manager
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
