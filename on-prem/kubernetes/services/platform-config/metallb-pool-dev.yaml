# Kubernetes/Helm 설정 파일입니다. 운영 정책을 선언형으로 관리합니다.

# Dev 전용 MetalLB Layer2 풀 — elice-dev 네임스페이스 Ingress/LB에 할당
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: elice-onprem-dev-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.50.10.0/28
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: elice-onprem-dev-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - elice-onprem-dev-pool
