# 서비스별 Helm values로, 이미지/Ingress/HPA/리소스 정책을 환경에 맞게 조정합니다.
# prod는 가용성과 확장성을 우선하고 dev/stage는 검증 효율과 비용 균형을 중점으로 둡니다.

# DB 호스트/계정은 Vault → ExternalSecret → Secret `elice-user-api-db-onprem-dev` (네임스페이스 elice-dev)
nameOverride: user-api
image:
  repository: harbor.dev.elice.com/elice/user-api
  tag: "dev-latest"
replicaCount: 1
service:
  port: 80
  targetPort: 8080
podAnnotations:
  elice.io/service-pattern: "http-db"
extraEnvFrom:
  - secretRef:
      name: elice-user-api-db-onprem-dev
resources:
  requests: { cpu: "120m", memory: "160Mi" }
  limits: { cpu: "400m", memory: "512Mi" }
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
ingress:
  enabled: true
  className: nginx
  useAwsAlb: false
  host: user-api.dev.elice.com
  path: /
  pathType: Prefix
database:
  migration:
    enabled: true
    sqlMigrationConfigMap: user-api-migrations
    envFrom:
      - secretRef:
          name: elice-user-api-db-onprem-dev
