# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: media-manager-storage-onprem
  namespace: elice-stage
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-onprem
    kind: ClusterSecretStore
  target:
    name: elice-media-manager-storage-onprem-stage
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: elice/onprem/stage/media-manager/minio
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: elice/onprem/stage/media-manager/minio
        property: secret_key
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: elice/onprem/stage/media-manager/minio
        property: endpoint
    - secretKey: S3_BUCKET
      remoteRef:
        key: elice/onprem/stage/media-manager/minio
        property: bucket
    - secretKey: S3_REGION
      remoteRef:
        key: elice/onprem/stage/media-manager/minio
        property: region
