# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

# Vault KV v2 경로는 클러스터 표준에 맞게 조정 (예: secret/data/elice/onprem/dev/user-api/database)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-api-db-onprem
  namespace: elice-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-onprem
    kind: ClusterSecretStore
  target:
    name: elice-user-api-db-onprem-dev
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: elice/onprem/dev/user-api/database
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: elice/onprem/dev/user-api/database
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: elice/onprem/dev/user-api/database
        property: name
    - secretKey: DB_USER
      remoteRef:
        key: elice/onprem/dev/user-api/database
        property: user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: elice/onprem/dev/user-api/database
        property: password
