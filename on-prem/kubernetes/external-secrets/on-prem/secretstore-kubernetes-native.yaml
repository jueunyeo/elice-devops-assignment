# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

# 옵션: Vault 대신 동일 클러스터의 기존 Secret을 참조 소스로 쓰는 패턴(샌드박스/전환기).
# 프로덕션은 ClusterSecretStore(Vault) 권장. IRSA/SA 권한 및 ESO 버전에 맞게 server/auth 블록을 조정하세요.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: kubernetes-native
  namespace: elice-dev
spec:
  provider:
    kubernetes:
      remoteNamespace: elice-dev
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: kube-system
      auth:
        serviceAccount:
          name: external-secrets
