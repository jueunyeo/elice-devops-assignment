# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

# 온프레미스: HashiCorp Vault KV v2 (Kubernetes auth). 환경별 경로로 Secret 전이 차단.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-onprem
spec:
  provider:
    vault:
      server: "https://vault.onprem.elice.internal"
      path: "secret"
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets-elice
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
