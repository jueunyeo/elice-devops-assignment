# ArgoCD 선언 파일로, Git 상태를 클러스터 상태와 동기화하는 GitOps 배포 기준을 정의합니다.
# AWS와 On-prem은 values/ingress/secret 경로만 다르고 배포 패턴은 동일하게 유지합니다.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # App-of-Apps Root (AWS):
  # - aws/kubernetes/argocd/apps 하위의 child Application들을 선언적으로 관리합니다.
  name: elice-aws-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jueunyeo/elice-devops-assignment.git
    targetRevision: main
    path: aws/kubernetes/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
