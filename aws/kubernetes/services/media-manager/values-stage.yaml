# 서비스별 Helm values로, 이미지/Ingress/HPA/리소스 정책을 환경에 맞게 조정합니다.
# prod는 가용성과 확장성을 우선하고 dev/stage는 검증 효율과 비용 균형을 중점으로 둡니다.

nameOverride: media-manager
image:
  repository: ghcr.io/elice/media-manager
  tag: "stage-latest"
replicaCount: 1
service:
  port: 80
  targetPort: 8080
podAnnotations:
  elice.io/service-pattern: "http-object-storage"
extraEnvFrom:
  - secretRef:
      name: elice-media-manager-s3-aws-stage
resources:
  requests: { cpu: "120m", memory: "160Mi" }
  limits: { cpu: "400m", memory: "512Mi" }
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
ingress:
  enabled: true
  className: alb
  host: media.stage.elice.com
  path: /
  pathType: Prefix
