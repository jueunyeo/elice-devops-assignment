# 서비스별 Helm values로, 이미지/Ingress/HPA/리소스 정책을 환경에 맞게 조정합니다.
# prod는 가용성과 확장성을 우선하고 dev/stage는 검증 효율과 비용 균형을 중점으로 둡니다.

nameOverride: api-gateway
image:
  repository: ghcr.io/elice/api-gateway
  tag: "prod-latest"
replicaCount: 3
service:
  port: 80
  targetPort: 8080
resources:
  requests: { cpu: "300m", memory: "384Mi" }
  limits: { cpu: "1000m", memory: "1Gi" }
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
ingress:
  enabled: true
  className: alb
  host: gateway.elice.com
  path: /
  pathType: Prefix
