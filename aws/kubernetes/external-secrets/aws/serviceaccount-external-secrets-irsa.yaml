# IRSA annotation for External Secrets Operator service account.
# Replace the role ARN per environment using Terraform output `eso_irsa_role_arn`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/<env>-eso-irsa-role
