# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: media-manager-s3
  namespace: elice-prod
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: elice-media-manager-s3-aws-prod
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: elice/prod/media-manager/s3
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: elice/prod/media-manager/s3
        property: secret_key
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: elice/prod/media-manager/s3
        property: endpoint
    - secretKey: S3_BUCKET
      remoteRef:
        key: elice/prod/media-manager/s3
        property: bucket
    - secretKey: S3_REGION
      remoteRef:
        key: elice/prod/media-manager/s3
        property: region
