# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: elice-dev
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
