# External Secrets 설정으로, 애플리케이션 비밀값을 런타임에 주입해 평문 Secret 노출을 방지합니다.
# 백엔드 저장소는 AWS Secrets Manager 또는 Vault를 사용하며 서비스 코드는 동일하게 유지됩니다.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-api-db
  namespace: elice-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: elice-user-api-db-aws-dev
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: elice/dev/user-api/database
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: elice/dev/user-api/database
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: elice/dev/user-api/database
        property: name
    - secretKey: DB_USER
      remoteRef:
        key: elice/dev/user-api/database
        property: user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: elice/dev/user-api/database
        property: password
